name: 🚀 Deploy E-LUXE Client to Development

on:
  push:
    branches: [ "develop" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  deploy-dev:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Condition simplifiée sans environment
    if: github.ref == 'refs/heads/develop'

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - name: 'Create env file'
      run: |
        echo "${{ secrets.DOT_ENV_DEVELOPMENT }}" > .env
  
    - name: Copy .env file to server using SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.DEV_HOST }}
        username: ${{ secrets.DEV_USERNAME }}
        key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        source: ".env"
        target: ${{ secrets.DEV_SERVER_PATH }}
  
    - name: Deploy using ssh
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_HOST }}
        username: ${{ secrets.DEV_USERNAME }}
        key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
        port: 22
        script: |
          set -e # Exit immediately if any command fails
          echo "➡️ Navigating to project directory..."
          cd ${{ secrets.DEV_SERVER_PATH }}

          echo "🔄 Pulling latest code from development branch..."
          git fetch --all
          git reset --hard origin/develop # A safer alternative to a pure pull for deployments

          echo "🔧 Fixing TypeScript configuration..."
          # Ensure baseUrl is set in tsconfig.json
          if grep -q '"baseUrl": "."' tsconfig.json; then
            echo "✅ baseUrl already configured"
          else
            echo "⚠️  Adding baseUrl to tsconfig.json"
            sed -i 's/"paths": {/"baseUrl": ".",\n    "paths": {/' tsconfig.json
          fi

          echo "🧹 Cleaning project artifacts..."
            # Remove build caches and node_modules for a fresh start
            rm -rf .next
            rm -rf node_modules/.cache

          echo "📦 Installing dependencies..."
          npm install --legacy-peer-deps # Use `npm ci` for cleaner, reproducible installs

          echo "🏗️ Building application..."
          NODE_OPTIONS="--max-old-space-size=2048" npm run build

          echo "🔄 Starting/Reloading application with PM2..."
          # Try to reload the app. If it fails (because it's not running), start it.
          pm2 reload ecosystem.config.js --env development || pm2 start ecosystem.config.js --env development

          echo "💾 Saving PM2 process list for recovery after reboot..."
          pm2 save

          echo "✅ Deployment successful! Application is live."
